<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"
"http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:h="http://xmlns.jcp.org/jsf/html">
<h:head>
    <title>JSF Noppa</title>
</h:head>
<h:body>
    <h2>Noppa</h2>
    <h:form id="lomake">
        <h:commandButton value="Heitä noppaa" actionListener="#{NoppaBean.heita(ae)}">
            <f:ajax execute="lomake" render="output1 output2 output3 output4"/>
        </h:commandButton>
        <h:commandButton value="Nollaa" actionListener="#{NoppaBean.nollaa(ae)}">
            <f:ajax execute="lomake" render="output1 output2 output3 output4"/>
        </h:commandButton>
    </h:form>

    <p>Tulos: <h:outputText id="output1" value="#{NoppaBean.tulos}"/></p>
    <p>Summa: <h:outputText id="output2" value="#{NoppaBean.summa}"/></p>
    <p>Heittojen lukumäärä: <h:outputText id="output3" value="#{NoppaBean.lukumaara}"/></p>
    <p>Keskiarvo: <h:outputText id="output4" value="#{NoppaBean.keskiarvo}"/></p>
</h:body>
</html>
<!--http://localhost:8080/JSFNoppa2/index.xhtml-->
